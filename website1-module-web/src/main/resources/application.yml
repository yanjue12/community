spring:
  profiles:
    active: dev

ark:
  ai:
    enabled: true
    platform-enabled: true
    platform-base-url: ${AI_PLATFORM_BASE_URL:http://127.0.0.1:8000}
    platform-api-key: ${AI_PLATFORM_API_KEY:}
    platform-connect-timeout-seconds: 3
    platform-read-timeout-seconds: 60
    platform-retry-count: 1
    platform-allow-degrade: true
    default-depth: ${ARK_DEFAULT_DEPTH:balanced}
    api-key: ${ARK_API_KEY:}
    base-url: https://ark.cn-beijing.volces.com/api/v3
    model: doubao-seed-2-0-pro-260215
    embedding-model: doubao-embedding-vision-251215
    allowed-models:
      - doubao-seed-2-0-pro-260215
      - doubao-1-5-pro-256k-250115
      - doubao-embedding-vision-251215
    allowed-chat-models:
      - doubao-seed-2-0-pro-260215
      - doubao-1-5-pro-256k-250115
    allowed-embedding-models:
      - doubao-embedding-vision-251215
    timeout-seconds: 90
    max-history-messages: 10
    context-ttl-minutes: 120
